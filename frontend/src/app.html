<!doctype html>
<html lang="en">

<head>
	<!-- start meta -->
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="description"
		content="Tech Stream Conference. Spannende Vorträge aus den Bereichen Programmierung, Maker-Szene und Spieleentwicklung erwarten dich." />
	<meta name="keywords" content="Conference, Coding, Games, Web, Art, Development, Maker, Hacking, Streaming" />
	<meta name="author" content="Tech Stream Conference" />
	<title>TECH STREAM CONFERENCE</title>

	<!-- end meta -->

	<!-- start immediate js -->
	<script>
		(() => {
			// If this is not working, have a look if the variables in 'lib/helper/light-dark.ts' are still corresponding.
			const theme = localStorage.getItem('TEST_CONF_THEME');
			const root = document.documentElement;

			root.classList.remove('light-theme', 'dark-theme');

			if (theme === 'light') {
				root.classList.add('light-theme');
			} else if (theme === 'dark') {
				root.classList.add('dark-theme');
			}
		})();
	</script>
	<!-- end immediate js -->

	<!-- start CSS -->
	<style>
		html,
		body {
			background: #000;
		}
	</style>
	<link rel="stylesheet" href="%sveltekit.assets%/main.css" />
	<!-- end CSS -->

	<!-- start preload -->
	<link rel="icon" href="%sveltekit.assets%/favicon.png" />
	%sveltekit.head%
	<!-- end preload -->
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
